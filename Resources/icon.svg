<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- macOS squircle backdrop -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a6772"/>
      <stop offset="1" stop-color="#2f3942"/>
    </linearGradient>
    <!-- brushed-metal paperclip -->
    <linearGradient id="clip" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#dfe6ea"/>
      <stop offset="1" stop-color="#aab6bd"/>
    </linearGradient>
    <!-- cyborg eye lens -->
    <radialGradient id="lens" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#d6ffe6"/>
      <stop offset="0.4" stop-color="#34e078"/>
      <stop offset="1" stop-color="#0b7a3b"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#46ff95" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#46ff95" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background squircle -->
  <rect x="92" y="92" width="840" height="840" rx="196" ry="196" fill="url(#bg)"/>
  <rect x="92" y="92" width="840" height="840" rx="196" ry="196" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.18"/>

  <!-- Paperclip body -->
  <path d="M 392 300 L 392 700 a 120 120 0 0 0 240 0 L 632 360 a 64 64 0 0 0 -128 0 L 504 660"
        fill="none" stroke="url(#clip)" stroke-width="58" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cyborg eye at the clip head -->
  <circle cx="392" cy="300" r="116" fill="url(#glow)"/>
  <circle cx="392" cy="300" r="58" fill="#06140c"/>
  <circle cx="392" cy="300" r="44" fill="url(#lens)"/>
  <circle cx="378" cy="286" r="12" fill="#eafff2" opacity="0.9"/>
</svg>
