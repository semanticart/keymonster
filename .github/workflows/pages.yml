name: Deploy website to GitHub Pages

# Serves docs/ as a static site. One-time setup in the repo: Settings → Pages →
# Source → "GitHub Actions". After that, every push to main that touches docs/
# redeploys automatically.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs
          # v4 started excluding dotfiles by default; docs/.nojekyll needs to
          # survive the upload or GitHub Pages' Jekyll build would ignore it.
          include-hidden-files: true
      - id: deployment
        uses: actions/deploy-pages@v5
